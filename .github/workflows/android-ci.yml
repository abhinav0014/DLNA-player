name: Android CI

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

env:
  APPVAULT_REPO: "abster07/app-vault"
  APP_ID: "livetv-player"
  APK_NAME: "livetv-player.apk"


jobs:
  build:
    if: contains(github.event.head_commit.message, 'buildapp')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleRelease
      
      - name: Rename APK to universal name
        run: mv app/build/outputs/apk/release/app-release.apk ${{ env.APK_NAME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ env.APK_NAME }}
